name = "gminev1"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".next-on-pages"

[vars]
# Add your environment variables here for deployment
# Values should be set in the Cloudflare Dashboard for security
NEXT_PUBLIC_APP_NAME = "GoldMine Pro"
NEXT_PUBLIC_APP_URL = "http://localhost:3000"
JWT_EXPIRES_IN = "7d"
MINING_INTERVAL_HOURS = "1"
BASE_MINING_RATE = "0.001"
WITHDRAWAL_DATE = "1"
MIN_WITHDRAWAL_AMOUNT = "500"

# Secret variables (Database, JWT Secret, API Keys) 
# Should NOT be committed here. Set them in Cloudflare Pages Dashboard:
# MONGODB_URI
# JWT_SECRET
# RAZORPAY_KEY_ID
# RAZORPAY_KEY_SECRET
# SMTP_USER
# SMTP_PASS
# CRON_SECRET
